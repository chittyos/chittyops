name: Reusable Worker Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name (e.g., chittyid, chittyauth)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        type: string
        default: 'production'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      include_beacon:
        description: 'Include ChittyBeacon'
        required: false
        type: boolean
        default: true
    secrets:
      CHITTYCONNECT_API_KEY:
        required: false

jobs:
  get-credentials:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      cloudflare_token: ${{ steps.creds.outputs.cloudflare_token }}
      account_id: ${{ steps.creds.outputs.account_id }}
    steps:
      - name: Fetch credentials via OIDC
        id: creds
        env:
          CRED_SERVICE: ${{ inputs.service_name }}
          CHITTYCONNECT_API_KEY: ${{ secrets.CHITTYCONNECT_API_KEY }}
        run: |
          # --- Auth strategy: OIDC preferred, API key fallback ---
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "Using OIDC authentication"

            # Get GitHub OIDC token for ChittyConnect
            OIDC_RESPONSE=$(curl -sS \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://connect.chitty.cc")
            OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty')

            if [ -z "$OIDC_TOKEN" ]; then
              echo "::error::Failed to obtain GitHub OIDC token"
              exit 1
            fi
            echo "OIDC token obtained"

            PAYLOAD='{"credentials":["CLOUDFLARE_API_TOKEN","CLOUDFLARE_ACCOUNT_ID"]}'

            CURL_EXIT=0
            HTTP_CODE=$(curl -s --max-time 30 -o /tmp/cc_response.json -w '%{http_code}' \
              https://connect.chitty.cc/api/github-actions/credentials \
              -H "Authorization: Bearer ${OIDC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD") || CURL_EXIT=$?
            RESPONSE=$(cat /tmp/cc_response.json 2>/dev/null || echo '{}')

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "::error::curl to ChittyConnect failed with exit code ${CURL_EXIT}"
              echo "::error::Response body: $(echo "$RESPONSE" | head -c 500)"
              exit 1
            fi
            echo "ChittyConnect responded with HTTP ${HTTP_CODE}"

          elif [ -n "$CHITTYCONNECT_API_KEY" ]; then
            echo "OIDC unavailable, using API key fallback"

            PAYLOAD='{"credentials":["CLOUDFLARE_API_TOKEN","CLOUDFLARE_ACCOUNT_ID"],"purpose":"worker-deploy","service":"'"$CRED_SERVICE"'"}'

            CURL_EXIT=0
            HTTP_CODE=$(curl -s --max-time 30 -o /tmp/cc_response.json -w '%{http_code}' \
              https://connect.chitty.cc/api/credentials/provision \
              -H "Authorization: Bearer ${CHITTYCONNECT_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD") || CURL_EXIT=$?
            RESPONSE=$(cat /tmp/cc_response.json 2>/dev/null || echo '{}')

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "::error::curl to ChittyConnect failed with exit code ${CURL_EXIT}"
              exit 1
            fi

          else
            echo "::error::No auth available. Either enable OIDC (permissions: { id-token: write }) or provide CHITTYCONNECT_API_KEY secret."
            exit 1
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_DETAIL=$(echo "$RESPONSE" | jq -r '.error.message // .error.code // empty' 2>/dev/null) || true
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL=$(echo "$RESPONSE" | head -c 500)
            fi
            echo "::error::ChittyConnect returned HTTP ${HTTP_CODE}: ${ERROR_DETAIL}"
            exit 1
          fi

          CF_TOKEN=$(echo "$RESPONSE" | jq -r '.credentials.CLOUDFLARE_API_TOKEN // .credential.value // empty' 2>/dev/null) || CF_TOKEN=""
          ACCT_ID=$(echo "$RESPONSE" | jq -r '.credentials.CLOUDFLARE_ACCOUNT_ID // .credential.account_id // empty' 2>/dev/null) || ACCT_ID=""

          if [ -z "$CF_TOKEN" ]; then
            echo "::error::No Cloudflare token in response. Keys: $(echo "$RESPONSE" | jq -r 'keys | join(", ")' 2>/dev/null || echo 'non-JSON')"
            echo "::error::Response preview: $(echo "$RESPONSE" | head -c 300)"
            exit 1
          fi

          echo "::add-mask::${CF_TOKEN}"

          {
            echo "cloudflare_token=${CF_TOKEN}"
            echo "account_id=${ACCT_ID}"
          } >> "$GITHUB_OUTPUT"

  deploy:
    needs: get-credentials
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - run: npm ci

      - name: Install ChittyBeacon
        if: inputs.include_beacon
        run: npm install @chittycorp/app-beacon --save

      - run: npm run build --if-present

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ needs.get-credentials.outputs.cloudflare_token }}
          accountId: ${{ needs.get-credentials.outputs.account_id }}
          environment: ${{ inputs.environment }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://${{ inputs.service_name }}.chitty.cc/health && echo "Health check passed" || echo "Health check pending"

      - name: Register with ChittyRegistry
        if: inputs.environment == 'production'
        run: |
          curl -X POST https://registry.chitty.cc/api/services/${{ inputs.service_name }}/heartbeat \
            -H "Content-Type: application/json" \
            -d '{"status":"deployed","version":"${{ github.sha }}"}' || true
        continue-on-error: true
