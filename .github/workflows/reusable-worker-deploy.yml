name: Reusable Worker Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name (e.g., chittyid, chittyauth)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        type: string
        default: 'production'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      include_beacon:
        description: 'Include ChittyBeacon'
        required: false
        type: boolean
        default: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - run: npm ci

      - name: Install ChittyBeacon
        if: inputs.include_beacon
        run: npm install @chittycorp/app-beacon --save

      - run: npm run build --if-present

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: ${{ inputs.environment }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://${{ inputs.service_name }}.chitty.cc/health && echo "Health check passed" || echo "Health check pending"

      - name: Register with ChittyRegistry
        if: inputs.environment == 'production'
        run: |
          curl -X POST https://registry.chitty.cc/api/services/${{ inputs.service_name }}/heartbeat \
            -H "Content-Type: application/json" \
            -d '{"status":"deployed","version":"${{ github.sha }}"}' || true
        continue-on-error: true
