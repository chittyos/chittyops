name: Registry Sync

# Re-enabled 2026-05-27 after chittyregistry#68 was resolved.
# Registry is read-only for clients; this workflow triggers an R2 rescan
# (empty-body POST) so registry.chitty.cc picks up out-of-band state
# changes. Service registrations themselves flow through register.chitty.cc
# (the Gatekeeper) per service onboarding — NOT through this workflow.

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-rescan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save js-yaml

      - name: Trigger registry rescan
        env:
          REGISTRY_URL: https://registry.chitty.cc
          CHITTYCONNECT_TOKEN: ${{ secrets.CHITTYCONNECT_API_KEY }}
        run: node scripts/sync-registry.js
