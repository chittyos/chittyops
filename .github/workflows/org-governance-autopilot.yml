name: Org Governance Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/apply-org-rulesets.sh"
      - "scripts/apply-repo-branch-protections.sh"
      - "scripts/apply-repo-settings.sh"
      - "scripts/audit-org-webhooks.sh"
      - "scripts/discover-org-checks.sh"
      - "scripts/generate-org-rulesets.py"
      - "compliance/rulesets/**"
      - ".github/workflows/org-webhook-compliance-audit.yml"

permissions:
  contents: read

concurrency:
  group: org-governance-autopilot
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.ORG_GOVERNANCE_TOKEN }}
      WEBHOOK_SECRET: ${{ secrets.CHITTYCONNECT_GITHUB_WEBHOOK_SECRET }}
      REQUIRED_APPROVING_REVIEW_COUNT: "0"
      ORGS: furnished-condos chittycorp chittyos chittyapps chicagoapps
      FALLBACK_ORGS: furnished-condos chittycorp chittyapps chicagoapps
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify governance token
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing required secret ORG_GOVERNANCE_TOKEN."
            exit 1
          fi
          gh auth status

      - name: Apply org rulesets
        run: |
          set -euo pipefail
          read -r -a orgs <<< "${ORGS}"
          bash ./scripts/apply-org-rulesets.sh "${orgs[@]}"

      - name: Apply repo fallback protections
        run: |
          set -euo pipefail
          read -r -a fallback_orgs <<< "${FALLBACK_ORGS}"
          bash ./scripts/apply-repo-branch-protections.sh --apply "${fallback_orgs[@]}"

      - name: Apply repo settings (auto-merge and auto-delete)
        run: |
          set -euo pipefail
          read -r -a orgs <<< "${ORGS}"
          bash ./scripts/apply-repo-settings.sh --apply "${orgs[@]}"

      - name: Audit and heal org webhooks
        run: |
          set -euo pipefail
          read -r -a orgs <<< "${ORGS}"
          if [[ -n "${WEBHOOK_SECRET:-}" ]]; then
            bash ./scripts/audit-org-webhooks.sh --apply "${orgs[@]}"
          else
            bash ./scripts/audit-org-webhooks.sh "${orgs[@]}"
          fi

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: governance-rulesets-${{ github.run_id }}
          path: |
            compliance/rulesets/check-inventory
            compliance/rulesets/orgs
          retention-days: 30
