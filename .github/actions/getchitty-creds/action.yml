name: 'getChitty Creds'
description: 'Fetches ephemeral credentials from ChittyConnect via GitHub OIDC (zero secrets) with API key fallback'
inputs:
  api_key:
    description: 'ChittyConnect API key (fallback when OIDC is unavailable)'
    required: false
    default: ''
  purpose:
    description: 'Purpose of credential request (included in audit log)'
    required: false
    default: 'ci-deploy'
  service:
    description: 'Service name requesting credentials (included in audit log)'
    required: false
    default: ''
  credentials:
    description: 'Comma-separated list of credentials to fetch (OIDC path only)'
    required: false
    default: 'CLOUDFLARE_API_TOKEN,CLOUDFLARE_ACCOUNT_ID'
  type:
    description: 'ChittyConnect credential type (API-key path). Determines server-side scoping/policy. Examples: cloudflare_workers_deploy.'
    required: false
    default: 'cloudflare_workers_deploy'
  zones:
    description: 'Comma-separated Cloudflare zone IDs to scope zone-bound permissions (e.g., Workers Routes Write). API-key path: forwarded as context.zones to ChittyConnect. OIDC path: forwarded but currently ignored server-side (see chittyconnect follow-up).'
    required: false
    default: ''
outputs:
  cloudflare_token:
    description: 'Ephemeral Cloudflare API token'
    value: ${{ steps.fetch.outputs.cloudflare_token }}
  account_id:
    description: 'Cloudflare Account ID'
    value: ${{ steps.fetch.outputs.account_id }}
  npm_token:
    description: 'Ephemeral npm token'
    value: ${{ steps.fetch.outputs.npm_token }}
  github_token:
    description: 'Ephemeral GitHub token'
    value: ${{ steps.fetch.outputs.github_token }}
  neon_token:
    description: 'Neon database URL (legacy name kept for compatibility)'
    value: ${{ steps.fetch.outputs.neon_token }}
  neon_database_url:
    description: 'Neon database URL'
    value: ${{ steps.fetch.outputs.neon_database_url }}
  register_token:
    description: 'Ephemeral ChittyRegister token'
    value: ${{ steps.fetch.outputs.register_token }}
runs:
  using: 'composite'
  steps:
    - name: Fetch ephemeral credentials
      id: fetch
      shell: bash
      env:
        CHITTYCONNECT_API_KEY: ${{ inputs.api_key }}
        CRED_PURPOSE: ${{ inputs.purpose }}
        CRED_SERVICE: ${{ inputs.service }}
        CRED_LIST: ${{ inputs.credentials }}
        CRED_TYPE: ${{ inputs.type }}
        CRED_ZONES: ${{ inputs.zones }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_RUN: ${{ github.run_id }}
      run: |
        # Build credentials array from comma-separated list (OIDC path)
        CRED_JSON=$(echo "$CRED_LIST" | jq -R 'split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | map(select(length > 0))')

        # Build zones array from comma-separated list (empty array if unset)
        ZONES_JSON=$(echo "$CRED_ZONES" | jq -R 'split(",") | map(ltrimstr(" ") | rtrimstr(" ")) | map(select(length > 0))')

        # --- Auth strategy: OIDC preferred, API key fallback ---
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
          # OIDC path (zero secrets)
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://connect.chitty.cc" \
            | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi

          # Forward zones in OIDC payload. Server-side honoring of context.zones
          # for zone-scoped permissions on this route is a chittyconnect follow-up
          # (today the OIDC route bypasses EnhancedCredentialProvisioner).
          PAYLOAD=$(jq -n \
            --argjson creds "$CRED_JSON" \
            --argjson zones "$ZONES_JSON" \
            '{credentials: $creds} + (if ($zones | length) > 0 then {zones: $zones} else {} end)')

          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/cc_response.json -w '%{http_code}' \
            https://connect.chitty.cc/api/github-actions/credentials \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          RESPONSE=$(cat /tmp/cc_response.json 2>/dev/null || echo '{}')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_DETAIL=$(echo "$RESPONSE" | jq -r '.error.message // .error.code // empty' 2>/dev/null)
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL=$(echo "$RESPONSE" | head -c 200)
            fi
            echo "::error::ChittyConnect returned HTTP ${HTTP_CODE}: ${ERROR_DETAIL}"
            exit 1
          fi

          # Check success
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"')
            echo "::error::ChittyConnect error: ${ERROR_MSG}"
            exit 1
          fi

          # Extract from OIDC response shape (.credentials.X)
          CF_TOKEN=$(echo "$RESPONSE" | jq -r '.credentials.CLOUDFLARE_API_TOKEN // empty')
          ACCT_ID=$(echo "$RESPONSE" | jq -r '.credentials.CLOUDFLARE_ACCOUNT_ID // empty')
          NPM_TOKEN=$(echo "$RESPONSE" | jq -r '.credentials.NPM_TOKEN // empty')
          GH_TOKEN=$(echo "$RESPONSE" | jq -r '.credentials.GITHUB_TOKEN // empty')
          NEON_URL=$(echo "$RESPONSE" | jq -r '.credentials.NEON_DATABASE_URL // empty')
          REG_TOKEN=$(echo "$RESPONSE" | jq -r '.credentials.CHITTYREGISTER_TOKEN // empty')

        elif [ -n "$CHITTYCONNECT_API_KEY" ]; then
          # API key fallback. Server contract (POST /api/credentials/provision):
          #   { type, context: { service, purpose, zones?, ... } }
          # Returns ONE credential per call (.credential.value, .credential.account_id).
          # Multi-credential outputs (npm/github/neon/register) are only populated via
          # the OIDC path above; under API-key auth they remain empty.
          PAYLOAD=$(jq -n \
            --arg type "$CRED_TYPE" \
            --arg purpose "$CRED_PURPOSE" \
            --arg service "$CRED_SERVICE" \
            --arg repo "$GITHUB_REPO" \
            --arg run_id "$GITHUB_RUN" \
            --argjson zones "$ZONES_JSON" \
            '{
              type: $type,
              context: ({
                service: $service,
                purpose: $purpose,
                repo: $repo,
                run_id: $run_id
              } + (if ($zones | length) > 0 then {zones: $zones} else {} end))
            }')

          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/cc_response.json -w '%{http_code}' \
            https://connect.chitty.cc/api/credentials/provision \
            -H "Authorization: Bearer ${CHITTYCONNECT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          RESPONSE=$(cat /tmp/cc_response.json 2>/dev/null || echo '{}')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_DETAIL=$(echo "$RESPONSE" | jq -r '.error.message // .error.code // empty' 2>/dev/null)
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL=$(echo "$RESPONSE" | head -c 200)
            fi
            echo "::error::ChittyConnect returned HTTP ${HTTP_CODE}: ${ERROR_DETAIL}"
            exit 1
          fi

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"')
            echo "::error::ChittyConnect error: ${ERROR_MSG}"
            exit 1
          fi

          # API-key route returns a single credential keyed under .credential
          CF_TOKEN=$(echo "$RESPONSE" | jq -r '.credential.value // empty')
          ACCT_ID=$(echo "$RESPONSE" | jq -r '.credential.account_id // empty')
          NPM_TOKEN=""
          GH_TOKEN=""
          NEON_URL=""
          REG_TOKEN=""

        else
          echo "::error::No auth available. Either enable OIDC (add 'permissions: { id-token: write }') or provide api_key input."
          exit 1
        fi

        # Mask all sensitive values
        for val in "$CF_TOKEN" "$NPM_TOKEN" "$GH_TOKEN" "$NEON_URL" "$REG_TOKEN"; do
          if [ -n "$val" ]; then
            echo "::add-mask::${val}"
          fi
        done

        # Write to outputs (neon_token is legacy alias for neon_database_url)
        {
          echo "cloudflare_token=${CF_TOKEN}"
          echo "account_id=${ACCT_ID}"
          echo "npm_token=${NPM_TOKEN}"
          echo "github_token=${GH_TOKEN}"
          echo "neon_token=${NEON_URL}"
          echo "neon_database_url=${NEON_URL}"
          echo "register_token=${REG_TOKEN}"
        } >> "$GITHUB_OUTPUT"
