name: Local Ingest Health Audit

# Watches local-only ingest pipeline on chittyserv-vm (systemd units +
# buffer dirs + disk). Same pattern as chittyconnect's binding-drift
# audit (#216/#217), adapted for filesystem/host-local checks.
#
# Architecture: this script must run *on chittyserv-vm* (the GitHub-
# hosted runner has no view of the VM's filesystem or systemd). The
# audit-local-ingest.sh script is run from a local systemd timer (or
# cron) on chittyserv-vm — see ops/INSTALL.md.
#
# What this workflow does: every 15 minutes it pulls the most recent
# audit report that chittyserv-vm has published (via the ChittyOps
# `latest-audit` artifact uploaded by the local timer's companion
# workflow), and opens / updates / closes a tracking issue based on
# drift state. The local script is the source of truth — this workflow
# is the issue-management layer.
#
# Closes when drift clears (matches chittyconnect#218 pattern).
# Tracking: chittyos/chittyentity#369

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      report_json:
        description: "Audit JSON to evaluate (default: pull latest from artifact)"
        required: false
        default: ""
  repository_dispatch:
    types: [local-ingest-audit]
  push:
    branches: [main]
    paths:
      - "scripts/audit-local-ingest.sh"
      - "config/local-ingest-health.allowlist.json"
      - ".github/workflows/local-ingest-health-audit.yml"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve audit report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REPORT: ${{ github.event.inputs.report_json }}
          DISPATCH_REPORT: ${{ toJson(github.event.client_payload) }}
        run: |
          set -e
          if [ -n "$INPUT_REPORT" ]; then
            echo "$INPUT_REPORT" > /tmp/audit.json
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "$DISPATCH_REPORT" > /tmp/audit.json
          else
            # Pull latest artifact published by chittyserv-vm's local timer.
            # The timer companion workflow (see scripts/install-local-ingest-timer.sh)
            # uploads an artifact named 'local-ingest-audit-latest' on every run.
            artifact_id=$(gh api repos/${{ github.repository }}/actions/artifacts \
              --jq '[.artifacts[] | select(.name=="local-ingest-audit-latest" and .expired==false)] | sort_by(.created_at) | reverse | .[0].id' || echo "")
            if [ -z "$artifact_id" ] || [ "$artifact_id" = "null" ]; then
              echo '{"host":"unknown","drift":false,"findings":[],"_no_report":true}' > /tmp/audit.json
            else
              gh api "repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip" > /tmp/a.zip
              unzip -p /tmp/a.zip > /tmp/audit.json
            fi
          fi
          drift=$(jq -r '.drift // false' /tmp/audit.json)
          host=$(jq -r '.host // "unknown"' /tmp/audit.json)
          no_report=$(jq -r '._no_report // false' /tmp/audit.json)
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "no_report=$no_report" >> "$GITHUB_OUTPUT"
          cat /tmp/audit.json

      - name: Open or update tracking issue (drift)
        if: steps.report.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/audit.json', 'utf8'));
            const lines = [
              `Local ingest health drift on **${report.host}** at ${report.timestamp}.`,
              ``,
              `Findings (${report.findings.length}):`,
              ...report.findings.map(f => `- \`${f.severity}\` **${f.code}** — ${f.detail}`),
              ``,
              `Source: \`scripts/audit-local-ingest.sh\` (chittyos/chittyentity#369).`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ];
            const body = lines.join('\n');
            const title = `local ingest health drift on ${report.host}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'local-ingest-drift',
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['local-ingest-drift', 'incident'],
              });
            }

      - name: Close tracking issue (drift cleared)
        if: steps.report.outputs.drift == 'false' && steps.report.outputs.no_report == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'local-ingest-drift',
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Drift cleared at ${new Date().toISOString()}. Audit run ${context.runId}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
